<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
        xmlns:sec = "http://www.thymeleaf.org/extras/spring-security">
<div class="header" th:fragment="headerFragment">
    <div class="nav">
        <h1 class="logo">
            <a th:href="@{/}"><img th:src="@{/images/logo.png}" alt="logo"></a>
        </h1>
        <div class="gnb">
            <ul>
                <li><a th:href="@{/}">HOME</a></li>
                <li><a th:href="@{/board/boardList}">게시판</a></li>

                <li><a th:href="@{/shop}">쇼핑몰</a></li>
                <th:block sec:authorize="isAnonymous()"> <!--비로그인 일때-->
                <li><a th:href="@{/member/join}">회원가입</a></li>
                <li><a th:href="@{/member/login}">로그인</a></li>
                </th:block>
                <th:block sec:authorize="isAuthenticated()"> <!--로그인 상태 일때-->
                    <li><a th:href="@{/board/write}">글작성</a></li>
                    <th:block th:if="${#authentication.principal.memberEntity.role.toString()!='ADMIN'}">
                <li ><a th:href="@{/member/detail/{id}(id=${#authentication.principal.memberEntity.id})}"
                       th:text="${#authentication.principal.memberEntity.userName+'님'}"
                        >내정보</a></li> </th:block>
                    <th:block th:unless="${#authentication.principal.memberEntity.role.toString()!='ADMIN'}">
                <li><a th:href="@{/member/memberList}">회원목록</a></li>
                <li><a th:href="@{/admin}">관리자</a></li>
                    </th:block>
                    <form action="/member/logout" method="post">
                        <li><button type="submit">로그아웃</button></li>
                    </form>
                </th:block>
            </ul>
        </div>
    </div>
</div>

</html>
