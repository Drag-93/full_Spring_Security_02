<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원상세보기</title>
    <link rel="stylesheet" th:href="@{/css/member/detail.css}">
</head>
<body>
<div th:replace="~{/fragments/common/header :: headerFragment}"></div>
<div class="detail">
    <div class="detail-con">
        <h1>회원 상세 정보</h1>
        <ul class="info-list">
            <li>
                <span class="label">이메일</span>
                <span class="content" th:text="${member.userEmail}"></span>
            </li>
            <li>
                <span class="label">비빌번호</span>
                <span class="content" th:type="password" th:text="${member.userPw}"></span>
            </li>
            <li>
                <span class="label">이름</span>
                <span class="content" th:text="${member.userName}"></span>
            </li>
            <li>
                <span class="label">권한</span>
                <span class="content" th:text="${member.role}"></span>
            </li>
            <li>
                <span class="label">가입일</span>
                <span class="content" th:text="${#temporals.format(member.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </li>
        </ul>
        <div class="btn-group">
            <a th:href="@{/member/memberList}" class="btn-list">목록으로</a>
            <a th:href="@{/member/update/{id}(id=${member.id})}" class="btn-edit">수정하기</a>
            <div th:if="${member.role.toString() == 'ADMIN'}">
                <a th:href="@{/member/delete/{id}(id=${member.id})}" class="btn-delete">삭제하기</a>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{/fragments/common/footer :: footerFragment}"></div>
</body>
</html>
